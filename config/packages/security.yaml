security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_(profiler|wdt)|css|images|js|assets|build)/
            security: false
        api_token:
            pattern: ^/token$
            security: false
        api:
            pattern: ^\/api\/(?!internal\/|docs$).*
            security: true
            stateless: true
            oauth2: true
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: login
                check_path: login
                enable_csrf: true
                csrf_token_id: login
                form_only: true
            login_link:
                check_route: login_check
                signature_properties: [id, email]
                max_uses: 3
            entry_point: App\Security\AuthenticationEntryPoint
            remember_me:
                always_remember_me: true
                signature_properties: ['id', 'email', 'password']
                lifetime: 31449600 # 1 year in seconds
            switch_user: true
            login_throttling:
                max_attempts: 3
            logout:
                path: /logout
                clear_site_data:
                    - cookies
                    - storage
            custom_authenticators:
                - App\Security\OAuthClient\GithubAuthenticator
                - App\Security\OAuthClient\GoogleAuthenticator

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: ROLE_API }
        - { path: ^/installation, roles: PUBLIC_ACCESS }
        - {
              path: ^/(login$|request-login-link$|forgot-password$|register$|reset-password),
              roles: PUBLIC_ACCESS,
          }
        - { path: ^/(token$|.well-known/jwks.json), roles: PUBLIC_ACCESS }
        - { path: ^/authorize, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
