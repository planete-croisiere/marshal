name: marshal

services:
  app:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: devmarshal
      DATABASE_URL: mysql://marshal:marshal@database:3306/marshal?serverVersion=8.0&charset=utf8mb4
      MAILER_DSN: smtp://mailpit:1025
      CORS_ALLOW_ORIGIN: |-
        ^https?://(localhost|assembly-station\.localhost|my-cabin\.localhost|marshal\.localhost)(:[0-9]+)?$
    depends_on:
      - database
      - mailpit
    volumes:
      - ../../:/app
      - vendor:/app/vendor
      - node_modules:/app/node_modules
      - var:/app/var
    networks:
      - default

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marshal
      MYSQL_USER: marshal
      MYSQL_PASSWORD: marshal
    volumes:
      - db-data:/var/lib/mysql
    ports:
        -   3308:3306

  mailpit:
    image: axllent/mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    labels:
      - traefik.enable=true
      - traefik.docker.network=planete-traefik
      - traefik.http.routers.mailpit.rule=Host(`mailpit.localhost`)
      - traefik.http.routers.mailpit.entrypoints=web
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
    networks:
      - default
      - proxy

  web:
    image: nginx:1.27-alpine
    depends_on:
      - app
    volumes:
      - ../../:/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=planete-traefik
      - traefik.http.routers.marshal.rule=Host(`marshal.localhost`)
      - traefik.http.routers.marshal.entrypoints=web,websecure
      - traefik.http.routers.marshal.tls=true
      - traefik.http.services.marshal.loadbalancer.server.port=80
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: planete-traefik

volumes:
  db-data:
  node_modules:
  vendor:
  var:
